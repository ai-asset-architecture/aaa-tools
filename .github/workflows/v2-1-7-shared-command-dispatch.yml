name: v2.1.7 Shared Command Dispatch

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "aaa/**"
      - "tests/test_repo_check_runtime_adoption.py"
      - "tests/test_shared_command_dispatch_runtime.py"
      - ".github/workflows/v2-1-7-shared-command-dispatch.yml"

jobs:
  validate-shared-command-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aaa-tools
        uses: actions/checkout@v4

      - name: Checkout aaa-tpl-docs
        uses: actions/checkout@v4
        with:
          repository: ai-asset-architecture/aaa-tpl-docs
          path: aaa-tpl-docs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install aaa-tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run v2.1.7 unit tests
        run: python -m pytest tests/test_repo_check_runtime_adoption.py tests/test_shared_command_dispatch_runtime.py -q

      - name: Validate canonical shared-dispatch pass bundle
        run: |
          python -m aaa.cli governance shared-command-dispatch \
            --dispatch-bundle aaa-tpl-docs/internal/development/contracts/ops/examples/pass/2026-04-04-v2.1.7-shared-command-dispatch-runtime-bundle.pass.json \
            --command-bundle aaa-tpl-docs/internal/development/contracts/ops/examples/pass/2026-04-04-v2.1.6-repo-check-runtime-adoption-bundle.pass.json \
            --format json

      - name: Validate canonical shared-dispatch fail bundle
        run: |
          set +e
          python -m aaa.cli governance shared-command-dispatch \
            --dispatch-bundle aaa-tpl-docs/internal/development/contracts/ops/examples/fail/2026-04-04-v2.1.7-shared-command-dispatch-runtime-bundle.fail.json \
            --command-bundle aaa-tpl-docs/internal/development/contracts/ops/examples/pass/2026-04-04-v2.1.6-repo-check-runtime-adoption-bundle.pass.json \
            --format json
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 2 ]; then
            echo "Expected exit code 2 for canonical fail bundle, got $exit_code"
            exit 1
          fi
