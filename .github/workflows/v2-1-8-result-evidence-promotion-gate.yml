name: v2.1.8 Result Evidence Promotion Gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "aaa/**"
      - "tests/test_result_artifact_eligibility_and_evidence_promotion_gate.py"
      - ".github/workflows/v2-1-8-result-evidence-promotion-gate.yml"

jobs:
  validate-result-evidence-promotion-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aaa-tools
        uses: actions/checkout@v4

      - name: Checkout aaa-tpl-docs
        uses: actions/checkout@v4
        with:
          repository: ai-asset-architecture/aaa-tpl-docs
          path: aaa-tpl-docs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install aaa-tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run v2.1.8 unit tests
        run: python -m pytest tests/test_result_artifact_eligibility_and_evidence_promotion_gate.py -q

      - name: Validate canonical promotion gate pass bundle
        run: |
          python -m aaa.cli governance result-evidence-promotion-gate \
            --bundle aaa-tpl-docs/internal/development/contracts/ops/examples/pass/2026-04-04-v2.1.8-result-artifact-eligibility-and-evidence-promotion-gate.pass.json \
            --format json

      - name: Validate canonical promotion gate fail bundle
        run: |
          set +e
          python -m aaa.cli governance result-evidence-promotion-gate \
            --bundle aaa-tpl-docs/internal/development/contracts/ops/examples/fail/2026-04-04-v2.1.8-result-artifact-eligibility-and-evidence-promotion-gate.fail.json \
            --format json
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 2 ]; then
            echo "Expected exit code 2 for canonical fail bundle, got $exit_code"
            exit 1
          fi
