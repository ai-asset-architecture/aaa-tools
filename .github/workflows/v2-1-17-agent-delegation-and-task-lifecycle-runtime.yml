name: v2.1.17 Agent Delegation and Task Lifecycle Runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "aaa/**"
      - "tests/test_agent_delegation_and_task_lifecycle_runtime.py"
      - ".github/workflows/v2-1-17-agent-delegation-and-task-lifecycle-runtime.yml"

jobs:
  validate-agent-delegation-and-task-lifecycle-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aaa-tools
        uses: actions/checkout@v4

      - name: Checkout aaa-tpl-docs
        uses: actions/checkout@v4
        with:
          repository: ai-asset-architecture/aaa-tpl-docs
          path: aaa-tpl-docs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install aaa-tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run v2.1.17 unit tests
        run: python -m pytest tests/test_agent_delegation_and_task_lifecycle_runtime.py -q

      - name: Validate canonical delegation runtime pass bundle
        run: |
          python -m aaa.cli governance delegation-lifecycle \
            --bundle aaa-tpl-docs/internal/development/contracts/ops/examples/pass/2026-04-04-v2.1.17-agent-delegation-and-task-lifecycle-runtime.pass.json \
            --format json

      - name: Validate canonical delegation runtime fail bundle
        run: |
          set +e
          python -m aaa.cli governance delegation-lifecycle \
            --bundle aaa-tpl-docs/internal/development/contracts/ops/examples/fail/2026-04-04-v2.1.17-agent-delegation-and-task-lifecycle-runtime.fail.json \
            --format json
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 2 ]; then
            echo "Expected exit code 2 for canonical fail bundle, got $exit_code"
            exit 1
          fi
