name: v2.1.28 Package Machine Interface Read Boundary

on:
  push:
    branches:
      - main
    paths:
      - "aaa/**"
      - "tests/test_package_machine_interface_read_boundary.py"
      - ".github/workflows/v2-1-28-package-machine-interface-read-boundary.yml"
  workflow_dispatch:

jobs:
  package-machine-interface-read-boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aaa-tools
        uses: actions/checkout@v4

      - name: Checkout aaa-tpl-docs
        uses: actions/checkout@v4
        with:
          repository: ai-asset-architecture/aaa-tpl-docs
          path: aaa-tpl-docs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install aaa-tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run targeted pytest
        run: python -m pytest tests/test_package_machine_interface_read_boundary.py -q

      - name: Validate canonical pass bundle
        run: >
          python -m aaa.cli governance package-machine-interface-read-boundary
          --bundle aaa-tpl-docs/internal/development/contracts/ops/examples/pass/2026-04-04-v2.1.28-package-machine-interface-read-boundary.pass.json
          --format json

      - name: Validate canonical fail bundle
        run: |
          set +e
          python -m aaa.cli governance package-machine-interface-read-boundary \
            --bundle aaa-tpl-docs/internal/development/contracts/ops/examples/fail/2026-04-04-v2.1.28-package-machine-interface-read-boundary.fail.json \
            --format json
          status=$?
          set -e
          test "$status" -eq 2
