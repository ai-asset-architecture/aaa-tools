name: v2.1.30 GitHub Governance Topology Contract Baseline

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "aaa/**"
      - "tests/test_github_governance_topology_contract_baseline.py"
      - ".github/workflows/v2-1-30-github-governance-topology-contract-baseline.yml"

jobs:
  validate-github-governance-topology-contract-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aaa-tools
        uses: actions/checkout@v4

      - name: Checkout aaa-tpl-docs
        uses: actions/checkout@v4
        with:
          repository: ai-asset-architecture/aaa-tpl-docs
          path: aaa-tpl-docs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install aaa-tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run v2.1.30 unit tests
        run: python -m pytest tests/test_github_governance_topology_contract_baseline.py -q

      - name: Validate canonical topology contract pass bundle
        run: |
          python -m aaa.cli governance github-governance-topology-contract-baseline \
            --bundle aaa-tpl-docs/internal/development/contracts/ops/examples/pass/2026-04-04-v2.1.30-github-governance-topology-contract-baseline.pass.json \
            --format json

      - name: Validate canonical topology contract fail bundle
        run: |
          set +e
          python -m aaa.cli governance github-governance-topology-contract-baseline \
            --bundle aaa-tpl-docs/internal/development/contracts/ops/examples/fail/2026-04-04-v2.1.30-github-governance-topology-contract-baseline.fail.json \
            --format json
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 2 ]; then
            echo "Expected exit code 2 for canonical fail bundle, got $exit_code"
            exit 1
          fi
