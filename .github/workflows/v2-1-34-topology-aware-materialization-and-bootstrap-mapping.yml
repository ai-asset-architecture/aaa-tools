name: v2.1.34 Topology-Aware Materialization and Bootstrap Mapping

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "aaa/**"
      - "tests/test_topology_aware_materialization_and_bootstrap_mapping.py"
      - ".github/workflows/v2-1-34-topology-aware-materialization-and-bootstrap-mapping.yml"

jobs:
  topology-aware-materialization-and-bootstrap-mapping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aaa-tools
        uses: actions/checkout@v4

      - name: Checkout aaa-tpl-docs
        uses: actions/checkout@v4
        with:
          repository: ai-asset-architecture/aaa-tpl-docs
          path: aaa-tpl-docs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install aaa-tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run unit tests
        run: python -m pytest tests/test_topology_aware_materialization_and_bootstrap_mapping.py -q

      - name: Validate canonical pass bundle
        run: |
          python -m aaa.cli governance topology-aware-materialization-and-bootstrap-mapping \
            --bundle aaa-tpl-docs/internal/development/contracts/ops/examples/pass/2026-04-04-v2.1.34-topology-aware-materialization-and-bootstrap-mapping.pass.json \
            --format json

      - name: Validate canonical fail bundle
        run: |
          set +e
          python -m aaa.cli governance topology-aware-materialization-and-bootstrap-mapping \
            --bundle aaa-tpl-docs/internal/development/contracts/ops/examples/fail/2026-04-04-v2.1.34-topology-aware-materialization-and-bootstrap-mapping.fail.json \
            --format json
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 2 ]; then
            echo "Expected exit code 2 for canonical fail bundle, got $exit_code"
            exit 1
          fi
