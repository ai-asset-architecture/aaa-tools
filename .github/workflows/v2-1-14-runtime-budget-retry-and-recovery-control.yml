name: v2.1.14 Runtime Budget Retry and Recovery Control

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "aaa/**"
      - "tests/test_runtime_budget_retry_and_recovery_control.py"
      - ".github/workflows/v2-1-14-runtime-budget-retry-and-recovery-control.yml"

jobs:
  validate-runtime-budget-retry-and-recovery-control:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aaa-tools
        uses: actions/checkout@v4

      - name: Checkout aaa-tpl-docs
        uses: actions/checkout@v4
        with:
          repository: ai-asset-architecture/aaa-tpl-docs
          path: aaa-tpl-docs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install aaa-tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run v2.1.14 unit tests
        run: python -m pytest tests/test_runtime_budget_retry_and_recovery_control.py -q

      - name: Validate canonical runtime control pass bundle
        run: |
          python -m aaa.cli governance runtime-control \
            --bundle aaa-tpl-docs/internal/development/contracts/ops/examples/pass/2026-04-04-v2.1.14-runtime-budget-retry-and-recovery-control.pass.json \
            --format json

      - name: Validate canonical runtime control fail bundle
        run: |
          set +e
          python -m aaa.cli governance runtime-control \
            --bundle aaa-tpl-docs/internal/development/contracts/ops/examples/fail/2026-04-04-v2.1.14-runtime-budget-retry-and-recovery-control.fail.json \
            --format json
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 2 ]; then
            echo "Expected exit code 2 for canonical fail bundle, got $exit_code"
            exit 1
          fi
