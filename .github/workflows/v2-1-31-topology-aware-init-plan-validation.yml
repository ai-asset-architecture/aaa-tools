name: v2.1.31 Topology-Aware Init Plan Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "aaa/**"
      - "tests/test_init_plan_presets.py"
      - "tests/test_topology_aware_init_plan_validation.py"
      - "specs/plan.schema.json"
      - "runbooks/init/plan.v2.0.json"
      - ".github/workflows/v2-1-31-topology-aware-init-plan-validation.yml"

jobs:
  validate-topology-aware-init-plan-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aaa-tools
        uses: actions/checkout@v4

      - name: Checkout aaa-tpl-docs
        uses: actions/checkout@v4
        with:
          repository: ai-asset-architecture/aaa-tpl-docs
          path: aaa-tpl-docs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install aaa-tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run v2.1.31 unit tests
        run: python -m pytest tests/test_init_plan_presets.py tests/test_topology_aware_init_plan_validation.py -q

      - name: Validate canonical topology-aware init pass bundle
        run: |
          python -m aaa.cli governance topology-aware-init-plan-validation \
            --bundle aaa-tpl-docs/internal/development/contracts/ops/examples/pass/2026-04-04-v2.1.31-topology-aware-init-plan-validation.pass.json \
            --format json

      - name: Validate canonical topology-aware init fail bundle
        run: |
          set +e
          python -m aaa.cli governance topology-aware-init-plan-validation \
            --bundle aaa-tpl-docs/internal/development/contracts/ops/examples/fail/2026-04-04-v2.1.31-topology-aware-init-plan-validation.fail.json \
            --format json
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 2 ]; then
            echo "Expected exit code 2 for canonical fail bundle, got $exit_code"
            exit 1
          fi
