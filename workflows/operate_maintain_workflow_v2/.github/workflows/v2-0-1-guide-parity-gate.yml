name: v2.0.1 Guide Parity Gate

on:
  pull_request:
    branches: [ main ]
    paths:
      - operate_maintain_guide.md
      - .github/workflows/v2-0-1-guide-parity-gate.yml
      - scripts/gates/verify_operate_maintain_guides.py
  workflow_dispatch:
    inputs:
      auto_fix_pr:
        description: "Auto-fix template guide by copying core guide and open PR"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  parity-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aaa-tpl-docs
        uses: actions/checkout@v4

      - name: Checkout aaa-docs
        uses: actions/checkout@v4
        with:
          repository: ai-asset-architecture/aaa-docs
          path: external/aaa-docs

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify guide parity
        run: |
          python3 scripts/gates/verify_operate_maintain_guides.py \
            --core-guide external/aaa-docs/bootstrap/operate_maintain_guide.md \
            --tpl-guide operate_maintain_guide.md \
            --report reports/guide-parity/v2-0-1-guide-parity-report.json

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guide-parity-v2-0-1
          path: reports/guide-parity/v2-0-1-guide-parity-report.json

  auto-fix-pr:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.auto_fix_pr }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aaa-tpl-docs
        uses: actions/checkout@v4

      - name: Checkout aaa-docs
        uses: actions/checkout@v4
        with:
          repository: ai-asset-architecture/aaa-docs
          path: external/aaa-docs

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Auto-fix template guide
        run: |
          python3 scripts/gates/verify_operate_maintain_guides.py \
            --core-guide external/aaa-docs/bootstrap/operate_maintain_guide.md \
            --tpl-guide operate_maintain_guide.md \
            --autofix-copy-core \
            --report reports/guide-parity/v2-0-1-guide-parity-report-autofix.json

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/v2-0-1-guide-parity-sync
          title: "chore(v2.0.1): auto-sync operate_maintain_guide parity"
          commit-message: "chore(v2.0.1): auto-sync operate_maintain_guide parity"
          body: |
            Auto-generated by v2.0.1 guide parity gate.
            - source: `aaa-docs/bootstrap/operate_maintain_guide.md`
            - target: `aaa-tpl-docs/operate_maintain_guide.md`
